<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日运势 - Daily Fortune</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 420px; margin: 0 auto; }
        .nav-bar { display: flex; background: white; border-radius: 16px; padding: 8px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow-x: auto; }
        .nav-item { flex: 1; padding: 12px 8px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 13px; color: #666; white-space: nowrap; }
        .nav-item.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-weight: 600; }
        .header { text-align: center; color: white; margin-bottom: 24px; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .btn-email { background: #EA4335; color: white; }
        .btn-gold { background: linear-gradient(135deg, #FFD700, #FFA500); color: #333; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #666; font-size: 14px; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .verify-group { display: flex; gap: 8px; }
        .verify-group input { flex: 1; }
        .verify-group button { width: auto; padding: 12px 16px; white-space: nowrap; }
        .login-options { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .divider { text-align: center; margin: 20px 0; position: relative; color: #999; font-size: 14px; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e0e0e0; }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .tab-switch { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-switch button { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #f0f0f0; color: #666; cursor: pointer; }
        .tab-switch button.active { background: #667eea; color: white; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(#667eea var(--score-deg), #f0f0f0 0); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; position: relative; }
        .score-circle::before { content: ''; width: 100px; height: 100px; background: white; border-radius: 50%; position: absolute; }
        .score-number { position: relative; font-size: 36px; font-weight: bold; color: #667eea; }
        .fortune-item { display: flex; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 12px; margin-bottom: 12px; }
        .fortune-item .label { width: 50px; color: #666; font-size: 14px; }
        .fortune-item .bar { flex: 1; height: 8px; background: #e0e0e0; border-radius: 4px; margin: 0 12px; overflow: hidden; }
        .fortune-item .bar-fill { height: 100%; border-radius: 4px; }
        .fortune-item .value { width: 30px; text-align: right; font-weight: 600; font-size: 14px; }
        .tips-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .tip-box { padding: 16px; border-radius: 12px; text-align: center; }
        .tip-box.good { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .tip-box.bad { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .lucky-info { display: flex; justify-content: space-around; padding: 16px; background: #f8f9fa; border-radius: 12px; margin-bottom: 16px; }
        .lucky-item { text-align: center; }
        .lucky-item .lucky-label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .lucky-item .lucky-value { font-size: 16px; font-weight: 600; color: #667eea; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .calendar-grid .weekday { font-size: 12px; color: #999; padding: 8px 0; }
        .calendar-grid .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 14px; color: #666; }
        .calendar-grid .day.checked { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .calendar-grid .day.today { border: 2px solid #667eea; }
        .ranking-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .ranking-number { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; font-size: 12px; margin-right: 12px; background: #f0f0f0; }
        .ranking-number.top3 { background: linear-gradient(135deg, #FFD700, #FFA500); color: white; }
        .memo-item { display: flex; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 12px; margin-bottom: 8px; }
        .knowledge-section { margin-top: 24px; }
        .knowledge-section h3 { margin-bottom: 16px; color: #333; }
        .knowledge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .knowledge-card { background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); border-radius: 16px; padding: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; }
        .knowledge-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .knowledge-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #667eea, #764ba2); }
        .knowledge-card.career::before { background: linear-gradient(90deg, #667eea, #764ba2); }
        .knowledge-card.wealth::before { background: linear-gradient(90deg, #f093fb, #f5576c); }
        .knowledge-card.love::before { background: linear-gradient(90deg, #fa709a, #fee140); }
        .knowledge-card.health::before { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        .knowledge-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 10px; background: white; }
        .knowledge-card h4 { font-size: 14px; color: #333; margin-bottom: 4px; }
        .knowledge-card p { font-size: 12px; color: #888; }
        .knowledge-card .loading { display: none; }
        .knowledge-card.loading .loading { display: block; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; border-radius: 24px 24px 0 0; padding: 24px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; }
        .modal-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 16px; }
        .modal-header h3 { flex: 1; font-size: 18px; }
        .close-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #f5f5f5; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .knowledge-tab { display: flex; gap: 8px; margin-bottom: 20px; }
        .knowledge-tab button { flex: 1; padding: 10px; border: none; border-radius: 10px; background: #f0f0f0; color: #666; cursor: pointer; font-size: 14px; }
        .knowledge-tab button.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .knowledge-content h4 { color: #667eea; font-size: 15px; margin-bottom: 8px; }
        .knowledge-content .concept { background: #f8f9fa; padding: 10px 14px; border-radius: 10px; font-size: 13px; color: #666; margin-bottom: 12px; }
        .knowledge-content .interpretation { font-size: 14px; line-height: 1.8; color: #333; margin-bottom: 16px; }
        .knowledge-content .advice-list { display: flex; flex-direction: column; gap: 8px; }
        .knowledge-content .advice-item { display: flex; align-items: center; padding: 10px 14px; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); border-radius: 10px; font-size: 13px; }
        .knowledge-content .advice-item::before { content: '✓'; width: 20px; height: 20px; background: #667eea; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-right: 10px; flex-shrink: 0; }
        .knowledge-content .synthesis { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; margin-top: 16px; }
        .memo-checkbox { width: 20px; height: 20px; margin-right: 12px; }
        .memo-text { flex: 1; font-size: 14px; }
        .memo-text.done { text-decoration: line-through; color: #999; }
        .week-day-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .week-day-name { width: 50px; font-size: 14px; color: #666; }
        .week-day-bar { flex: 1; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 0 12px; }
        .week-day-fill { height: 100%; border-radius: 10px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 11px; color: white; }
        .empty-state { text-align: center; color: #999; padding: 40px 20px; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:8px 0;">
            <div class="header" style="margin:0;text-align:left;">
                <h1 style="font-size:24px;">✨ 每日运势</h1>

            </div>
            <div id="authButtons" style="display:flex;gap:8px;">
                <button class="btn btn-secondary" onclick="showQuickLogin()" style="padding:8px 16px;font-size:13px;">⚡ 快速体验</button>
                <button class="btn" onclick="showLoginModal()" style="padding:8px 16px;font-size:13px;">登录</button>

        <!-- 登录页 -->
        <div class="card" id="loginCard">

            <div class="tab-switch">
                <button class="active" onclick="switchAuthMode('login')" id="loginTab">登录</button>
                <button onclick="switchAuthMode('register')" id="registerTab">注册</button>

            <div id="loginForm">
                <div class="form-group">

                        <button class="btn btn-secondary" onclick="sendCode('login')" id="loginSendBtn">获取验证码</button>
                    </div>
                </div>
                <button class="btn" onclick="loginWithEmail()">登录</button>

                    <label>邮箱地址</label>
                    <input type="email" id="regEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>验证码</label>
                    <div class="verify-group">

                        <button class="btn btn-secondary" onclick="sendCode('register')" id="regSendBtn">获取验证码</button>

                <div class="form-group">

            <div class="divider">或</div>
            <button class="btn btn-secondary" onclick="loginWithLocal()">使用昵称+生日登录</button>
        </div>
        
        <!-- 运势页 -->
        <div id="fortunePage" class="hidden">
            <div class="card">
                <div style="text-align:center;">
                    <div class="score-circle" id="scoreCircle"><span class="score-number" id="scoreNumber">-</span></div>
                    <div>今日综合运势</div>
                </div>
                <div id="fortuneDetails" style="margin-top:20px;">
                    <div class="fortune-item"><span class="label">事业</span><div class="bar"><div class="bar-fill" id="careerBar" style="width:0%;background:#667eea;"></div></div><span class="value" id="careerValue">-</span></div>
                    <div class="fortune-item"><span class="label">财运</span><div class="bar"><div class="bar-fill" id="wealthBar" style="width:0%;background:#f093fb;"></div></div><span class="value" id="wealthValue">-</span></div>
                    <div class="fortune-item"><span class="label">感情</span><div class="bar"><div class="bar-fill" id="loveBar" style="width:0%;background:#f5576c;"></div></div><span class="value" id="loveValue">-</span></div>
                    <div class="fortune-item"><span class="label">健康</span><div class="bar"><div class="bar-fill" id="healthBar" style="width:0%;background:#4facfe;"></div></div><span class="value" id="healthValue">-</span></div>
                </div>
                <div class="lucky-info">
                    <div class="lucky-item"><div class="lucky-label">幸运色</div><div class="lucky-value" id="luckyColor">-</div></div>
                    <div class="lucky-item"><div class="lucky-label">幸运数字</div><div class="lucky-value" id="luckyNumber">-</div></div>

                    <div class="tip-box bad"><div style="font-size:12px;color:#666;margin-bottom:4px;">❌ 忌</div><div style="font-size:14px;font-weight:600;" id="avoid">-</div></div>

                <div class="knowledge-grid">
                    <div class="knowledge-card career" onclick="showKnowledge('career')">

                    </div>
                    <div class="knowledge-card wealth" onclick="showKnowledge('wealth')">
                        <div class="knowledge-icon">💰</div>
                        <h4>财运</h4>
                        <p>点击查看 AI 解读</p>
                    </div>
                    <div class="knowledge-card love" onclick="showKnowledge('love')">
                        <div class="knowledge-icon">💕</div>
                        <h4>感情运</h4>
                        <p>点击查看 AI 解读</p>
                    </div>
                    <div class="knowledge-card health" onclick="showKnowledge('health')">
                        <div class="knowledge-icon">🏃</div>
                        <h4>健康运</h4>
                        <p>点击查看 AI 解读</p>

            <div class="card">

        <div id="memoPage" class="hidden"><div class="card"><h3>📝 今日备忘</h3><div style="display:flex;gap:8px;margin-bottom:16px;"><input type="text" id="memoInput" placeholder="添加备忘..." style="flex:1;padding:12px;border:2px solid #e0e0e0;border-radius:12px;"><button class="btn" onclick="addMemo()" style="width:auto;padding:12px 20px;">+</button></div><div id="memoList"></div></div></div>

    <!-- 知识解读弹窗 -->
    <div class="modal-overlay" id="knowledgeModal" onclick="closeKnowledgeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">

                <div class="modal-icon" id="knowledgeModalIcon">💼</div>
                <h3 id="knowledgeModalTitle">事业运势解读</h3>
                <button class="close-btn" onclick="closeKnowledgeModal()">×</button>
            </div>
            <div class="knowledge-tab">
                <button class="active" onclick="switchKnowledgeTab('chinese')" id="tab-chinese">🇨🇳 中国传统</button>

            </div>
            <div id="knowledgeLoading" style="text-align:center;padding:40px;">
                <div style="font-size:32px;margin-bottom:12px;">⏳</div>
                <div>AI 正在生成运势解读...</div>
            </div>
            <div id="knowledgeContent" class="hidden">
                <div class="knowledge-content" id="chineseContent">
                    <h4 id="chineseTitle"></h4>
                    <div class="concept" id="chineseConcept"></div>
                    <div class="interpretation" id="chineseInterpretation"></div>
                    <div class="advice-list" id="chineseAdvice"></div>
                </div>
                <div class="knowledge-content hidden" id="westernContent">
                    <h4 id="westernTitle"></h4>
                    <div class="concept" id="westernConcept"></div>
                    <div class="interpretation" id="westernInterpretation"></div>
                    <div class="advice-list" id="westernAdvice"></div>
                </div>
                <div class="synthesis" id="knowledgeSynthesis"></div>
            </div>
        </div>

    <script>
        const API_BASE = '/api';
        let currentAccount = null, authToken = localStorage.getItem('fortune_token'), countdownTimer = null;
        
        function switchAuthMode(mode) {
            document.getElementById('loginTab').classList.toggle('active', mode === 'login');
            document.getElementById('registerTab').classList.toggle('active', mode === 'register');
            document.getElementById('loginForm').classList.toggle('hidden', mode !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', mode !== 'register');
        }
        
        function switchPage(page, el) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (el) el.classList.add('active');
            ['loginCard', 'fortunePage', 'weekPage', 'rankPage', 'memoPage', 'accountPage'].forEach(id => document.getElementById(id).classList.add('hidden'));
            if (!currentAccount) { document.getElementById('loginCard').classList.remove('hidden'); return; }
            document.getElementById(page + 'Page').classList.remove('hidden');
            if (page === 'fortune') loadFortune();
            if (page === 'week') loadWeekFortune();
            if (page === 'rank') loadRanking('today');
            if (page === 'memo') loadMemos();
            if (page === 'account') loadAccountInfo();
        }
        
        async function sendCode(type) {
            const emailInput = type === 'login' ? document.getElementById('loginEmail') : document.getElementById('regEmail');
            const btn = type === 'login' ? document.getElementById('loginSendBtn') : document.getElementById('regSendBtn');
            const email = emailInput.value.trim();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('请输入正确的邮箱地址'); return; }
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/auth/email/send-code`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, type }) }).then(r => r.json());
                if (res.success) { alert(res.debugCode ? `验证码：${res.debugCode}` : '验证码已发送'); startCountdown(btn, 60); }
                else { alert(res.error); btn.disabled = false; }
            } catch { alert('网络错误'); btn.disabled = false; }
        }
        
        function startCountdown(btn, seconds) {
            let remaining = seconds;
            btn.textContent = `${remaining}s`;
            countdownTimer = setInterval(() => { remaining--; if (remaining <= 0) { clearInterval(countdownTimer); btn.disabled = false; btn.textContent = '获取验证码'; } else btn.textContent = `${remaining}s`; }, 1000);
        }
        
        async function loginWithEmail() {
            const email = document.getElementById('loginEmail').value.trim();
            const code = document.getElementById('loginCode').value.trim();
            if (!email || !code) return alert('请填写邮箱和验证码');
            const res = await fetch(`${API_BASE}/auth/email/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, code }) }).then(r => r.json());
            if (res.success) handleLoginSuccess(res); else alert(res.error);
        }
        
        async function registerWithEmail() {
            const email = document.getElementById('regEmail').value.trim();
            const code = document.getElementById('regCode').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const birthday = document.getElementById('regBirthday').value;
            if (!email || !code || !nickname || !birthday) return alert('请填写完整信息');
            const res = await fetch(`${API_BASE}/auth/email/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, code, nickname, birthday }) }).then(r => r.json());
            if (res.success) handleLoginSuccess(res); else alert(res.error);
        }
        
        async function loginWithLocal() {
            const nickname = prompt('昵称：'), birthday = prompt('生日（YYYY-MM-DD）：');
            if (!nickname || !birthday) return;
            const res = await fetch(`${API_BASE}/auth/local`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nickname, birthday }) }).then(r => r.json());
            if (res.success) handleLoginSuccess(res);
        }
        
        function handleLoginSuccess(res) {
            currentAccount = res.account; authToken = res.token;
            localStorage.setItem('fortune_token', authToken);
            localStorage.setItem('fortune_account', JSON.stringify(currentAccount));
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('fortunePage').classList.remove('hidden');
            loadFortune();
        }
        
        async function loadFortune() {
            const res = await fetchWithAuth('/fortune/today');
            if (!res.success) return;
            const f = res.fortune;
            document.getElementById('scoreNumber').textContent = f.overall;
            document.getElementById('scoreCircle').style.setProperty('--score-deg', (f.overall/100*360) + 'deg');
            ['career', 'wealth', 'love', 'health'].forEach(k => { document.getElementById(k + 'Value').textContent = f[k]; document.getElementById(k + 'Bar').style.width = f[k] + '%'; });
            document.getElementById('luckyColor').textContent = f.luckyColor;
            document.getElementById('luckyNumber').textContent = f.luckyNumber;
            document.getElementById('luckyTime').textContent = f.luckyTime;
            document.getElementById('suitable').textContent = f.suitable;
            document.getElementById('avoid').textContent = f.avoid;
            document.getElementById('checkInBtn').textContent = res.hasCheckedIn ? '已打卡 ✓' : '今日打卡';
            document.getElementById('checkInBtn').disabled = res.hasCheckedIn;
            loadCalendar();
        }
        
        async function loadCalendar() {
            const res = await fetchWithAuth('/checkins?month=' + new Date().toISOString().slice(0, 7));
            if (!res.success) return;
            const checkins = res.checkins || [];
            document.getElementById('streakDays').textContent = res.stats?.streakDays || 0;
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            let html = days.map(d => `<div class="weekday">${d}</div>`).join('');
            const now = new Date(), year = now.getFullYear(), month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate(), today = now.getDate();
            const checkedDates = new Set(checkins.map(c => parseInt(c.date.split('-')[2])));
            for (let i = 0; i < firstDay; i++) html += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) html += `<div class="day ${checkedDates.has(d) ? 'checked' : ''} ${d === today ? 'today' : ''}">${d}</div>`;
            document.getElementById('calendarGrid').innerHTML = html;
        }
        
        async function checkIn() {
            const res = await fetchWithAuth('/checkin', { method: 'POST' });
            if (res.success) { document.getElementById('checkInBtn').textContent = '已打卡 ✓'; document.getElementById('checkInBtn').disabled = true; loadCalendar(); }
        }
        
        async function loadWeekFortune() {
            const res = await fetchWithAuth('/fortune/week');
            if (!res.success) return;
            document.getElementById('weekList').innerHTML = res.weekFortunes.map(d => `<div class="week-day-item"><div class="week-day-name">周${d.weekday}${d.isToday ? '(今天)' : ''}</div><div class="week-day-bar"><div class="week-day-fill" style="width:${d.fortune.overall}%;background:${d.fortune.overall >= 80 ? '#667eea' : d.fortune.overall >= 60 ? '#f093fb' : '#fcb69f'}">${d.fortune.overall}</div></div></div>`).join('');
        }
        
        async function loadRanking(type) {
            const res = await fetchWithAuth('/rankings?type=' + type);
            if (!res.success) return;
            if (!res.rankings || res.rankings.length === 0) { document.getElementById('rankingList').innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无排行，快来打卡吧！</div></div>'; return; }
            document.getElementById('rankingList').innerHTML = res.rankings.map((r, i) => `<div class="ranking-item"><div class="ranking-number ${i < 3 ? 'top3' : ''}">${r.rank}</div><div style="flex:1;">${r.nickname}</div><div style="font-weight:600;color:#667eea;">${r.score || r.streak}${type === 'today' ? '分' : '天'}</div></div>`).join('');
        }
        
        async function loadMemos() {
            const res = await fetchWithAuth('/memos?date=' + new Date().toISOString().split('T')[0]);
            if (!res.success) return;
            if (!res.memos || res.memos.length === 0) { document.getElementById('memoList').innerHTML = '<div class="empty-state"><div class="icon">📝</div><div>暂无备忘</div></div>'; return; }
            document.getElementById('memoList').innerHTML = res.memos.map(m => `<div class="memo-item"><input type="checkbox" class="memo-checkbox" ${m.isDone ? 'checked' : ''} onchange="toggleMemo('${m._id}', this.checked)"><div class="memo-text ${m.isDone ? 'done' : ''}">${m.content}</div><span onclick="deleteMemo('${m._id}')" style="color:#ff4757;cursor:pointer;">×</span></div>`).join('');
        }
        
        async function addMemo() {
            const content = document.getElementById('memoInput').value;
            if (!content) return;
            await fetchWithAuth('/memos', { method: 'POST', body: JSON.stringify({ content, date: new Date().toISOString().split('T')[0] }) });
            document.getElementById('memoInput').value = ''; loadMemos();
        }
        
        async function toggleMemo(id, isDone) { await fetchWithAuth(`/memos/${id}`, { method: 'PUT', body: JSON.stringify({ isDone }) }); loadMemos(); }
        async function deleteMemo(id) { await fetchWithAuth(`/memos/${id}`, { method: 'DELETE' }); loadMemos(); }
        
        async function loadAccountInfo() {
            const res = await fetchWithAuth('/account');
            if (!res.success) return;
            const acc = res.account;
            document.getElementById('accountInfo').innerHTML = `<div><strong>昵称：</strong>${acc.profile.nickname}</div><div><strong>邮箱：</strong>${acc.profile.email || '未绑定'}</div><div><strong>VIP：</strong>${acc.vip.isVip ? '已开通' : '未开通'}</div>`;
        }
        
        async function fetchWithAuth(url, options = {}) {
            options.headers = options.headers || {};
            options.headers['Authorization'] = `Bearer ${authToken}`;
            options.headers['Content-Type'] = 'application/json';
            return fetch(`${API_BASE}${url}`, options).then(r => r.json());
        }
        
        function share() { const text = `今日运势：${currentAccount?.nickname || ''} 的综合运势是 ${document.getElementById('scoreNumber').textContent} 分！`; if (navigator.share) navigator.share({ title: '每日运势', text, url: location.href }); else alert('复制分享：\n' + text); }
        function showVIP() { switchPage('account'); }
        function buyVIP(type) { alert(`创建${type === 'month' ? '月度' : '年度'}VIP订单\n需接入真实支付`); }
        function logout() { localStorage.removeItem('fortune_token'); localStorage.removeItem('fortune_account'); location.reload(); }
        
        // ==================== 运势知识功能 ====================
        let currentKnowledgeTheme = null;
        let currentKnowledgeData = null;
        
        const knowledgeThemes = {
            career: { name: '事业', icon: '💼', color: '#667eea' },
            wealth: { name: '财运', icon: '💰', color: '#f093fb' },
            love: { name: '感情', icon: '💕', color: '#fa709a' },
            health: { name: '健康', icon: '🏃', color: '#4facfe' }
        };
        
        async function showKnowledge(theme) {
            if (!currentAccount) {
                alert('请先登录后查看 AI 运势解读');
                return;
            }
            
            currentKnowledgeTheme = theme;
            const t = knowledgeThemes[theme];
            
            document.getElementById('knowledgeModalIcon').textContent = t.icon;
            document.getElementById('knowledgeModalTitle').textContent = t.name + '运势解读';
            document.getElementById('knowledgeModal').classList.add('active');
            document.getElementById('knowledgeLoading').classList.remove('hidden');
            document.getElementById('knowledgeContent').classList.add('hidden');
            
            // 调用后端 API 获取 AI 解读
            try {
                const res = await fetchWithAuth(`/knowledge?theme=${theme}`);
                if (res.success) {
                    currentKnowledgeData = res.knowledge;
                    renderKnowledge();
                } else {
                    alert('获取解读失败，请重试');
                    closeKnowledgeModal();
                }
            } catch (err) {
                console.error('获取知识失败:', err);
                alert('网络错误，请重试');
                closeKnowledgeModal();
            }
        }
        
        function renderKnowledge() {
            if (!currentKnowledgeData) return;
            
            const d = currentKnowledgeData;
            
            // 中国传统
            document.getElementById('chineseTitle').textContent = d.chinese.title;
            document.getElementById('chineseConcept').textContent = '【' + d.chinese.concept + '】';
            document.getElementById('chineseInterpretation').textContent = d.chinese.interpretation;
            document.getElementById('chineseAdvice').innerHTML = d.chinese.advice.map(a => `<div class="advice-item">${a}</div>`).join('');
            
            // 西方占星
            document.getElementById('westernTitle').textContent = d.western.title;
            document.getElementById('westernConcept').textContent = '【' + d.western.concept + '】';
            document.getElementById('westernInterpretation').textContent = d.western.interpretation;
            document.getElementById('westernAdvice').innerHTML = d.western.advice.map(a => `<div class="advice-item">${a}</div>`).join('');
            
            // 总结
            document.getElementById('knowledgeSynthesis').textContent = d.synthesis;
            
            // 显示内容
            document.getElementById('knowledgeLoading').classList.add('hidden');
            document.getElementById('knowledgeContent').classList.remove('hidden');
            switchKnowledgeTab('chinese');
        }
        
        function switchKnowledgeTab(tab) {
            document.getElementById('tab-chinese').classList.toggle('active', tab === 'chinese');
            document.getElementById('tab-western').classList.toggle('active', tab === 'western');
            document.getElementById('chineseContent').classList.toggle('hidden', tab !== 'chinese');
            document.getElementById('westernContent').classList.toggle('hidden', tab !== 'western');
        }
        
        function closeKnowledgeModal(e) {
            if (!e || e.target.id === 'knowledgeModal') {
                document.getElementById('knowledgeModal').classList.remove('active');
                currentKnowledgeTheme = null;
                currentKnowledgeData = null;
            }
        }
        
        // ==================== 顶部导航功能 ====================
        function showQuickLogin() {
            const nickname = prompt('请输入昵称：') || '游客' + Math.floor(Math.random() * 1000);
            const birthday = prompt('请输入生日（YYYY-MM-DD，用于运势计算）：') || '2000-01-01';
            loginWithLocalQuick(nickname, birthday);
        }
        
        async function loginWithLocalQuick(nickname, birthday) {
            const res = await fetch(`${API_BASE}/auth/local`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nickname, birthday }) }).then(r => r.json());
            if (res.success) handleLoginSuccess(res);
        }
        
        function showLoginModal() {
            // 滚动到登录卡片
            document.getElementById('loginCard').scrollIntoView({ behavior: 'smooth' });
            // 如果没有登录卡片显示，先显示它
            if (currentAccount) {
                alert('您已登录');
            }
        }
        
        function updateAuthUI() {
            const authButtons = document.getElementById('authButtons');
            const userMenu = document.getElementById('userMenu');
            
            if (currentAccount) {
                authButtons.classList.add('hidden');
                userMenu.classList.remove('hidden');
                document.getElementById('userNickname').textContent = currentAccount.nickname;
            } else {
                authButtons.classList.remove('hidden');
                userMenu.classList.add('hidden');
            }
        }
        
        // 重写 handleLoginSuccess 添加 UI 更新
        const originalHandleLoginSuccess = handleLoginSuccess;
        handleLoginSuccess = function(res) {
            currentAccount = res.account; authToken = res.token;
            localStorage.setItem('fortune_token', authToken);
            localStorage.setItem('fortune_account', JSON.stringify(currentAccount));
            document.getElementById('loginCard').classList.add('hidden');
            document.getElementById('fortunePage').classList.remove('hidden');
            updateAuthUI();
            loadFortune();
        }
        
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        document.getElementById('regBirthday').max = new Date().toISOString().split('T')[0];
        
        const saved = localStorage.getItem('fortune_account');
        if (saved && authToken) { 
            currentAccount = JSON.parse(saved); 
            document.getElementById('loginCard').classList.add('hidden'); 
            document.getElementById('fortunePage').classList.remove('hidden'); 
            updateAuthUI();
            loadFortune(); 
        }
    </script>
</body>
</html>
